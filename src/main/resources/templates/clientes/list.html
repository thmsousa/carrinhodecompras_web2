<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Clientes')}"></head>
<body class="bg-light">
<header th:replace="~{fragments/layout :: header}"></header>

<main class="container">
    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
        <div class="card-header bg-white border-0 py-4 px-4 d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
            <div>
                <h4 class="fw-bold m-0 text-dark">
                    <i class="bi bi-people-fill text-success me-2"></i> Clientes Cadastrados
                </h4>
            </div>

            <div class="mb-3">
                <a th:href="@{/clientes/form-pf}" class="btn btn-success">
                    <i class="bi bi-person-plus"></i> Nova Pessoa Física
                </a>
                <a th:href="@{/clientes/form-pj}" class="btn btn-info">
                    <i class="bi bi-building-plus"></i> Nova Pessoa Jurídica
                </a>
            </div>

            <form th:action="@{/clientes/lista}" method="get" class="d-flex gap-2">
                <input type="text" name="nome" class="form-control border-0 bg-light rounded-pill px-3 shadow-none" placeholder="Buscar por nome..." th:value="${param.nome}">
                <button type="submit" class="btn btn-success rounded-pill px-4 fw-bold shadow-sm">Filtrar</button>
            </form>
        </div>

        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light text-muted small text-uppercase">
                    <tr>
                        <th class="ps-4">ID</th>
                        <th>Nome / Razão Social</th>
                        <th>E-mail</th>
                        <th>Tipo / Documento</th>
                        <th class="text-center pe-4">Ações</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="c : ${clientes}">
                        <td class="ps-4"><span class="badge bg-light text-dark border" th:text="${c.id}"></span></td>
                        <td class="fw-bold text-dark" th:text="${c.nomeExibicao}"></td>
                        <td th:text="${c.email}"></td>
                        <td>
                            <div th:if="${c instanceof T(com.example.atv3_associacoes.model.entity.PessoaFisica)}">
                                <span class="badge rounded-pill bg-info-subtle text-info border border-info-subtle px-3">PF</span>
                                <small class="d-block text-muted"
                                       th:text="${((T(com.example.atv3_associacoes.model.entity.PessoaFisica)) c).cpf}"></small>
                            </div>

                            <div th:if="${c instanceof T(com.example.atv3_associacoes.model.entity.PessoaJuridica)}">
                                <span class="badge rounded-pill bg-dark-subtle text-dark border border-dark-subtle px-3">PJ</span>
                                <small class="d-block text-muted"
                                       th:text="${((T(com.example.atv3_associacoes.model.entity.PessoaJuridica)) c).cnpj}"></small>
                            </div>
                        </td>
                        <td class="text-center pe-4">
                            <a class="btn btn-white btn-sm rounded-pill px-3 fw-bold text-success border shadow-sm" th:href="@{/clientes/{id}/vendas(id=${c.id})}">
                                <i class="bi bi-eye-fill me-1"></i> Ver Vendas
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
