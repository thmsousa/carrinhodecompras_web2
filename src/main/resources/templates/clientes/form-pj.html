<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Cadastro de Pessoa Jurídica')}"></head>
<body class="bg-light">
<header th:replace="~{fragments/layout :: header}"></header>
<main class="container">
    <div class="card shadow-sm rounded-4">
        <div class="card-body p-4">
            <h4 class="fw-bold mb-4">Nova Pessoa Jurídica</h4>
            <form th:action="@{/clientes/save-pj}" th:object="${pessoaJuridica}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-bold">Razão Social</label>
                    <input type="text" th:field="*{razaoSocial}" class="form-control" th:classappend="${#fields.hasErrors('razaoSocial')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{razaoSocial}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">CNPJ</label>
                    <input type="text" th:field="*{cnpj}" class="form-control" th:classappend="${#fields.hasErrors('cnpj')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{cnpj}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">E-mail</label>
                    <input type="email" th:field="*{email}" class="form-control" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{email}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Telefone</label>
                    <input type="text" th:field="*{telefone}" class="form-control" th:classappend="${#fields.hasErrors('telefone')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{telefone}"></div>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success rounded-pill px-4">Salvar Cliente PJ</button>
                    <a th:href="@{/clientes/lista}" class="btn btn-light rounded-pill px-4 border">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</main>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
