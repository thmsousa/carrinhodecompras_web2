<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"><head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Sistema de Vendas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<nav th:fragment="header" class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-5 py-3">
    <div class="container">
        <a class="navbar-brand fw-bold text-success" th:href="@{/}">
            Sistema de Vendas
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link px-3 fw-medium text-dark" th:href="@{/produtos/lista}">Produtos</a></li>
                <li class="nav-item"><a class="nav-link px-3 fw-medium text-dark" th:href="@{/vendas/lista}">Vendas</a></li>

                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link px-3 fw-medium text-dark" th:href="@{/clientes/lista}">Clientes</a>
                </li>

                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <span class="nav-link px-3 text-muted">Olá, <strong sec:authentication="name"></strong></span>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="nav-link btn btn-link px-3 fw-medium text-danger">Sair</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</div>
</body>
</html>
