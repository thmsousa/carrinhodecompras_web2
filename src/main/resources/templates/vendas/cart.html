<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Meu Carrinho')}"></head>
<body class="bg-light">
<header th:replace="~{fragments/layout :: header}"></header>

<div class="container">

    <div th:if="${mensagemErro}" class="alert alert-danger border-0 shadow-sm rounded-4 mb-4 d-flex align-items-center">
        <div class="bg-danger rounded-circle p-2 me-3 d-flex align-items-center justify-content-center shadow-sm" style="width: 40px; height: 40px;">
            <i class="bi bi-exclamation-triangle-fill text-white"></i>
        </div>
        <div>
            <strong class="d-block text-danger small text-uppercase fw-bold">Erro de Validação</strong>
            <span class="text-dark" th:text="${mensagemErro}"></span>
        </div>
    </div>

    <div th:if="${mensagemSucesso}" class="alert alert-success border-0 shadow-sm rounded-4 mb-4 d-flex align-items-center">
        <div class="bg-success rounded-circle p-2 me-3 d-flex align-items-center justify-content-center shadow-sm" style="width: 40px; height: 40px;">
            <i class="bi bi-info-circle-fill text-white fs-5"></i>
        </div>
        <div>
            <strong class="d-block text-success small text-uppercase fw-bold">Carrinho</strong>
            <span class="text-dark" th:text="${mensagemSucesso}"></span>
        </div>
        <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="row g-4">
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                <div class="card-header bg-white border-0 py-3"><h4 class="fw-bold m-0 text-dark">Itens no Carrinho</h4></div>
                <div class="card-body p-0 text-center py-5" th:if="${venda == null or venda.itens.isEmpty()}">
                    <i class="bi bi-cart-x display-1 text-muted opacity-25"></i>
                    <p class="fs-5 mt-3 text-muted">Seu carrinho está vazio.</p>
                    <a th:href="@{/produtos/lista}" class="btn btn-success rounded-pill px-4 shadow-sm fw-bold">Ver Catálogo</a>
                </div>
                <div th:if="${venda != null and !venda.itens.isEmpty()}" class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light text-muted small text-uppercase">
                        <tr><th class="ps-4">Produto</th><th class="text-center">Quantidade</th><th>Subtotal</th><th class="text-center">Ações</th></tr>
                        </thead>
                        <tbody>
                        <tr th:each="item, stat : ${venda.itens}">
                            <td class="ps-4 fw-bold text-dark" th:text="${item.produto.descricao}"></td>
                            <td style="width: 150px;">
                                <form th:action="@{/vendas/atualizar-quantidade}" method="post">
                                    <input type="hidden" name="index" th:value="${stat.index}">
                                    <input type="number" name="novaQuantidade" th:value="${item.quantidade}"
                                           onchange="this.form.submit()" min="1"
                                           class="form-control text-center border-0 bg-light fw-bold rounded-pill shadow-none">
                                </form>
                            </td>
                            <td class="fw-bold text-success" th:text="'R$ ' + ${#numbers.formatDecimal(item.total(), 1, 'POINT', 2, 'COMMA')}"></td>
                            <td class="text-center">
                                <form th:action="@{/vendas/remover-item}" method="post">
                                    <input type="hidden" name="index" th:value="${stat.index}">
                                    <button type="submit" class="btn btn-outline-danger btn-sm border-0"><i class="bi bi-trash"></i></button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card border-0 shadow-lg rounded-4 bg-success text-white">
                <div class="card-body p-4">
                    <h5 class="fw-bold mb-4">Resumo da Compra</h5>
                    <div class="mb-4 text-center">
                        <small class="d-block text-uppercase opacity-75 fw-bold mb-1">Valor Total</small>
                        <h2 class="display-6 fw-bold mb-0" th:text="'R$ ' + ${#numbers.formatDecimal(venda != null ? venda.total() : 0, 1, 'POINT', 2, 'COMMA')}"></h2>
                    </div>
                    <form th:action="@{/vendas/finalizar}" method="post">
                        <div class="mb-4 text-dark">
                            <label class="form-label small fw-bold text-white opacity-75">SELECIONAR CLIENTE</label>
                            <select name="cliente.id" class="form-select border-0 shadow-sm py-2 rounded-3" >
                                <option value="" disabled selected>Escolha um cliente...</option>
                                <option th:each="c : ${clientes}" th:value="${c.id}" th:text="${c.nomeExibicao}"></option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-light btn-lg w-100 fw-bold text-success shadow rounded-pill">
                            FINALIZAR COMPRA
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
