<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Histórico de Vendas')}"></head>
<body class="bg-light">
<header th:replace="~{fragments/layout :: header}"></header>

<main class="container">
    <div th:if="${mensagemSucesso}" class="alert alert-success border-0 shadow-sm rounded-4 mb-4 d-flex align-items-center">
        <div class="bg-success rounded-circle p-2 me-3 d-flex align-items-center justify-content-center shadow-sm" style="width: 40px; height: 40px;">
            <i class="bi bi-check-lg text-white fs-5"></i>
        </div>
        <div>
            <strong class="d-block text-success small text-uppercase fw-bold">Sucesso</strong>
            <span class="text-dark" th:text="${mensagemSucesso}"></span>
        </div>
        <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
        <div class="card-header bg-white border-0 py-4 px-4 d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
            <div>
                <h4 class="fw-bold m-0 text-dark">
                    <i class="bi bi-receipt text-success me-2"></i> Histórico de Vendas
                </h4>
                <small class="text-muted">Consulte todas as transações realizadas no sistema</small>
            </div>

            <form th:action="@{/vendas/lista}" method="get" class="d-flex gap-2 align-items-end">
                <div>
                    <label class="form-label small fw-bold text-muted text-uppercase mb-1">Filtrar por Data</label>
                    <input type="date" name="dataFiltro" class="form-control border-0 bg-light rounded-pill px-3 shadow-none" th:value="${param.dataFiltro}">
                </div>
                <button type="submit" class="btn btn-success rounded-pill px-4 shadow-sm fw-bold">Buscar</button>
                <a th:href="@{/vendas/lista}" class="btn btn-light rounded-pill border fw-bold text-muted">Limpar</a>
            </form>
        </div>

        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light text-muted small text-uppercase">
                    <tr>
                        <th class="ps-4 py-3">ID</th>
                        <th class="py-3">Data e Hora</th>
                        <th class="py-3">Cliente</th>
                        <th class="py-3">Total</th>
                        <th class="text-center pe-4 py-3">Ação</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="v : ${vendas}">
                        <td class="ps-4">
                            <span class="badge bg-light text-dark border" th:text="'#' + ${v.id}"></span>
                        </td>
                        <td th:text="${#temporals.format(v.data, 'dd/MM/yyyy HH:mm')}"></td>
                        <td>
                            <span class="fw-bold text-dark" th:text="${v.cliente != null ? v.cliente.nomeExibicao : 'N/A'}"></span>
                        </td>
                        <td>
                            <span class="fw-bold text-success" th:text="'R$ ' + ${#numbers.formatDecimal(v.total(), 1, 'POINT', 2, 'COMMA')}"></span>
                        </td>
                        <td class="text-center pe-4">
                            <a class="btn btn-white btn-sm rounded-pill px-3 fw-bold text-success border shadow-sm"
                               th:href="@{/vendas/detalhes/{id}(id=${v.id})}">
                                <i class="bi bi-search me-1"></i> Detalhes
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(vendas)}">
                        <td colspan="5" class="text-center py-5 text-muted">
                            <i class="bi bi-inbox display-4 d-block mb-2 opacity-25"></i>
                            Nenhuma venda encontrada.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
