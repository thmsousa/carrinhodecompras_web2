<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Detalhes da Venda')}"></head>
<body class="bg-light">
<header th:replace="~{fragments/layout :: header}"></header>

<div class="container pb-5">
    <div class="d-flex align-items-center justify-content-between mb-4">
        <h2 class="fw-bold m-0 text-dark">Venda #<span th:text="${venda.id}"></span></h2>
        <a th:href="@{/vendas/lista}" class="btn btn-white rounded-pill border fw-bold text-muted shadow-sm px-4">
            <i class="bi bi-arrow-left me-1"></i> Voltar
        </a>
    </div>

    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card border-0 shadow-sm rounded-4 h-100">
                <div class="card-body p-4">
                    <h5 class="fw-bold mb-4 border-bottom pb-2">
                        <i class="bi bi-person-circle text-success me-2"></i>Cliente
                    </h5>
                    <div class="mb-3">
                        <label class="small text-muted text-uppercase fw-bold d-block">Nome / Razão Social</label>
                        <span class="fw-bold text-dark fs-5" th:text="${venda.cliente.nomeExibicao}"></span>
                    </div>
                    <div class="mb-3">
                        <label class="small text-muted text-uppercase fw-bold d-block">Documento</label>

                        <div th:if="${venda.cliente instanceof T(com.example.atv3_associacoes.model.entity.PessoaFisica)}">
                            <span class="badge bg-success-subtle text-success border border-success-subtle mb-1">Pessoa Física</span>
                            <div class="text-dark fw-medium"
                                 th:text="'CPF: ' + ${((T(com.example.atv3_associacoes.model.entity.PessoaFisica)) venda.cliente).cpf}"></div>
                        </div>

                        <div th:if="${venda.cliente instanceof T(com.example.atv3_associacoes.model.entity.PessoaJuridica)}">
                            <span class="badge bg-dark-subtle text-dark border border-dark-subtle mb-1">Pessoa Jurídica</span>
                            <div class="text-dark fw-medium"
                                 th:text="'CNPJ: ' + ${((T(com.example.atv3_associacoes.model.entity.PessoaJuridica)) venda.cliente).cnpj}"></div>
                        </div>
                    </div>
                    <div class="mt-4 p-3 bg-light rounded-3 border-start border-success border-4">
                        <label class="small text-muted text-uppercase fw-bold d-block mb-1">Data da Venda</label>
                        <span class="text-dark fw-bold" th:text="${#temporals.format(venda.data, 'dd/MM/yyyy HH:mm')}"></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card border-0 shadow-sm rounded-4 overflow-hidden h-100">
                <div class="card-header bg-white border-0 pt-4 px-4">
                    <h5 class="fw-bold m-0">Itens da Transação</h5>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light text-muted small text-uppercase">
                            <tr>
                                <th class="ps-4">Produto</th>
                                <th class="text-center">Qtd</th>
                                <th>Unitário</th>
                                <th class="pe-4 text-end">Subtotal</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="item : ${venda.itens}">
                                <td class="ps-4 fw-bold text-dark" th:text="${item.produto.descricao}"></td>
                                <td class="text-center" th:text="${item.quantidade}"></td>
                                <td th:text="'R$ ' + ${#numbers.formatDecimal(item.produto.valor, 1, 'POINT', 2, 'COMMA')}"></td>
                                <td class="pe-4 fw-bold text-success text-end" th:text="'R$ ' + ${#numbers.formatDecimal(item.total(), 1, 'POINT', 2, 'COMMA')}"></td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="card-footer bg-white border-0 p-4">
                    <div class="d-flex justify-content-end align-items-center">
                        <div class="text-end">
                            <span class="text-muted text-uppercase small fw-bold d-block">Total da Venda</span>
                            <span class="h2 fw-bold text-danger m-0" th:text="'R$ ' + ${#numbers.formatDecimal(venda.total(), 1, 'POINT', 2, 'COMMA')}"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
